<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FederiGene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 320px;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-app-region: drag;
    }

    .card {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 20px;
      border: 1px solid rgba(96, 165, 250, 0.2);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 40px rgba(59, 130, 246, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
      animation: rotate 8s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .logo-wrap {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      animation: pulse-logo 2s ease-in-out infinite;
    }

    @keyframes pulse-logo {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(59,130,246,0.4)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(59,130,246,0.7)); }
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-size: 0.78rem;
      color: rgba(148, 163, 184, 0.8);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      margin-top: -16px;
    }

    .loader {
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #60a5fa;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; background: #818cf8; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #a78bfa; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .status {
      font-size: 0.72rem;
      color: rgba(148, 163, 184, 0.5);
      position: relative;
      z-index: 1;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img class="logo" src="assets/icon.png" alt="FederiGene" onerror="this.style.display='none'" />
    </div>
    <div class="title">FederiGene</div>
    <div class="subtitle">Federated Genomics Platform</div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status">Starting secure node...</div>
  </div>
</body>
</html>
