services:
  - type: web
    name: federigene-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # You will set this manually in the Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
