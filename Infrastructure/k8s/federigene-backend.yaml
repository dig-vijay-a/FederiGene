apiVersion: apps/v1
kind: Deployment
metadata:
  name: federigene-backend
  labels:
    app: federigene-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: federigene-backend
  template:
    metadata:
      labels:
        app: federigene-backend
    spec:
      containers:
      - name: backend
        image: federigene-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: federigene-secrets
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: federigene-backend-svc
spec:
  selector:
    app: federigene-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
